<!-- HARD REQUIREMENTS
1. Full viewport layout
Entire page fills viewport
No vh slicing
2. Sidebar behavior

Desktop:

fixed width
full available height

Mobile:

becomes horizontal section
stacks above cards/content
3. Card row behavior

Desktop:

cards in single row
equal width
gap between them

Tablet/mobile:

cards wrap automatically

Rules:

use flex-wrap
no media query for every card breakpoint
4. Content area
fills remaining space vertically
scrolls internally if content overflows
sidebar should NOT affect content scrolling
5. Header/footer
natural height
never shrink
❌ Forbidden
CSS Grid
position absolute/fixed/sticky
hardcoded viewport math
float
calc hacks
Required concepts

You MUST use:

nested flex containers
flex-grow
flex-basis
flex-wrap
min-height: 0
overflow
media queries
Hidden difficulty

Most people fail:

making content scroll correctly
preventing sidebar shrink
making wrapped cards stay equal width
handling nested flex overflow -->
